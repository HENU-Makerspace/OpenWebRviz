# Jetson 机器人配置文件

# Jetson 配置
jetson:
  host: "192.168.1.58"
  user: "jetson"
  maps_dir: "/home/nvidia/maps"

# Rosbridge 配置
rosbridge:
  port: 9090
  address: "0.0.0.0"

# SLAM 配置
slam:
  launch_file: "mapping_all.launch.py"
  package: "jetson_node_pkg"

# Navigation 配置
navigation:
  launch_file: "nav_all.launch.py"
  package: "jetson_node_pkg"
  default_map: ""

# 前端配置
frontend:
  ws_url: "ws://192.168.1.58:9090"
  api_url: "http://192.168.1.58:4000"

# 话题配置
topics:
  scan: "/scan"
  map: "/map"
  cmd_vel: "/cmd_vel"
  tf: "/tf"
  global_plan: "/plan"
  local_plan: "/local_plan"
